services:
  app:
    build: .
    image: swedish-cards:local
    container_name: swedish-cards
    ports:
      - "127.0.0.1:${HTTP_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      DB_PATH: /data/swedish.db
      HTTP_ADDR: ":8080"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      NEW_PER_DAY: ${NEW_PER_DAY:-10}
      REVERSE_CARDS: ${REVERSE_CARDS:-false}
      BASIC_USER: ${BASIC_USER:-}
      BASIC_PASS: ${BASIC_PASS:-}
    restart: unless-stopped
